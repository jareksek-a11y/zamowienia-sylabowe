<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylabowe Ciężarówki - Magazyn Przygód</title>
    <style>
        body {
            /* Zmiana czcionki na Arial */
            font-family: Arial, Helvetica, sans-serif;
            background-color: #e0f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Licznik punktów - Zablokowany w jednym miejscu, nie zawija tekstu */
        #score-counter {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            background-color: #2196f3;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            font-weight: bold;
            white-space: nowrap; /* Zapobiega przechodzeniu do nowej linii */
        }

        /* Stylizacja Ekranu Startowego */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff9c4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }

        #warehouse-man {
            font-size: 10rem;
            margin-bottom: 20px;
            line-height: 1;
        }

        #game-title {
            font-size: 3rem;
            color: #d32f2f;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        button {
            font-size: 2.5rem; padding: 25px 50px;
            background-color: #ff9800; color: white;
            border: none; border-radius: 25px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }
        button:hover { background-color: #e68a00; transform: scale(1.05); }
        button:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        
        /* Stylizacja Kontenera Gry */
        #game-container {
            text-align: center;
            width: 100%; max-width: 900px;
            padding: 30px;
            margin-top: 20px;
            display: none;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        #word-display { font-size: 3.5rem; font-weight: bold; color: #333; margin: 15px 0; text-transform: uppercase; }
        #image-display { max-height: 250px; max-width: 250px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); margin-bottom: 10px; object-fit: contain;}
        
        #syllables-container {
            display: flex; justify-content: center; gap: 20px;
            margin: 40px 0; flex-wrap: wrap; min-height: 100px;
        }
        .syllable {
            font-size: 3rem; background-color: #4caf50; color: white;
            padding: 20px 40px; border-radius: 15px; cursor: grab;
            user-select: none; box-shadow: 0 6px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            font-weight: bold;
        }
        .syllable:active { cursor: grabbing; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        #trucks-container {
            display: flex; justify-content: center; gap: 25px;
            margin-top: 50px; position: relative; flex-wrap: wrap;
        }
        .truck-wrapper {
            display: flex; flex-direction: column; align-items: center;
            transition: transform 2.5s ease-in;
        }
        .truck-bed {
            width: 150px; height: 100px;
            border: 4px dashed #757575; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: -15px; z-index: 1; background-color: rgba(255,255,255,0.6);
            transition: background-color 0.3s, border-color 0.3s;
        }
        .truck-bed.filled {
            border-style: solid; border-color: #4caf50; background-color: transparent;
        }

        .truck-img { 
            font-size: 6rem; 
            z-index: 0; 
            user-select: none; 
            transform: scaleX(-1);
            display: inline-block;
        }
        
        .drive-away { transform: translateX(2000px); }

        /* Kciuk - Wymuszona pozycja centralna i brak blokowania kliknięć */
        #thumbs-up {
            display: none; 
            position: fixed;
            top: 50%; left: 50%; 
            margin: 0; padding: 0;
            line-height: 1;
            transform: translate(-50%, -50%);
            font-size: 18rem; 
            z-index: 2000;
            pointer-events: none;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Ekran Kamienia Milowego (Co 10 słów) */
        #milestone-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #e8f5e9;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            text-align: center;
        }

        #smiling-worker-milestone {
            font-size: 12rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        #milestone-text {
            font-size: 3rem;
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 40px;
        }

        #yes-button {
            background-color: #4caf50;
        }
        #yes-button:hover { background-color: #388e3c; }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-30px);}
            60% {transform: translateY(-15px);}
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div id="game-title">Sylabowe Ciężarówki</div>
        <div id="warehouse-man">👨‍🔧</div>
        <button onclick="startGame()">START!</button>
    </div>

    <div id="score-counter">📦 Zrealizowane: <span id="score-value">0</span></div>

    <div id="game-container">
        <img id="image-display" src="" alt="Przedmiot">
        <div id="word-display"></div>
        <div id="syllables-container"></div>
        <div id="trucks-container"></div>
    </div>

    <div id="milestone-screen">
        <div id="smiling-worker-milestone">👷‍♂️✨👍</div>
        <div id="milestone-text">Zrealizowałeś 10 zamówień!</div>
        <button id="yes-button" onclick="continueGame()" style="display: none;">TAK!</button>
    </div>

    <div id="thumbs-up">👍</div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQl1v8YHdeG7Y-IAdVkiRpPcEeo8oedqzxdilFRs8eD2ak2PdepgWeBw-zngXEXagm7JS_4flbf0eoy/pub?gid=0&single=true&output=csv"; 
        
        let wordsData = [];
        let currentWordIndex = -1;
        let filledTrucks = 0;
        let wordsCompletedCount = 0;
        let audioCtx;
        let speechSynth = window.speechSynthesis;

        const fallbackData = [
            { word: "krowa", image: "", count: 2, syllables: ["kro", "wa"] },
            { word: "banan", image: "", count: 2, syllables: ["ba", "nan"] },
            { word: "samochód", image: "", count: 3, syllables: ["sa", "mo", "chód"] },
            { word: "żyrafa", image: "", count: 3, syllables: ["ży", "ra", "fa"] },
            { word: "dom", image: "", count: 1, syllables: ["dom"] }
        ];

        async function fetchImageUrl(searchTerm) {
            const apiKey = '55011272-6080908fb8e3709114cdc34dd'; 
            const url = `https://pixabay.com/api/?key=${apiKey}&q=${encodeURIComponent(searchTerm)}&image_type=photo&per_page=3&lang=pl`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.hits && data.hits.length > 0) {
                    return data.hits[0].webformatURL; 
                } else {
                    return "https://via.placeholder.com/250x250.png?text=Brak+Obrazka";
                }
            } catch (error) {
                console.error("Błąd wyszukiwania obrazka:", error);
                return "https://via.placeholder.com/250x250.png?text=Błąd+Ładowania";
            }
        }

        async function fetchWords() {
            try {
                if(!CSV_URL) throw new Error("Brak linku");
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split(/\r?\n/).slice(1); 
                
                wordsData = rows.map(row => {
                    const cols = row.split(',').map(c => c.trim());
                    if(cols.length < 3) return null;
                    const count = parseInt(cols[2]);
                    if (isNaN(count)) return null;
                    const syllables = cols.slice(3, 3 + count);
                    return { word: cols[0], image: cols[1] || null, count: count, syllables: syllables };
                }).filter(w => w !== null && w.word !== "");
                
                if (wordsData.length === 0) throw new Error("Pusty arkusz");

            } catch (error) {
                console.warn("Używam danych awaryjnych (Błąd arkusza):", error.message);
                wordsData = fallbackData;
            }
        }

        async function startGame() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            await speak("Bierzemy się do roboty", 0, 1.1); 

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('score-counter').style.display = 'block';
            
            await fetchWords();
            loadNextWord();
        }

        function speak(text, delay = 0, pitch = 1) {
            return new Promise(resolve => {
                speechSynth.cancel(); 
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'pl-PL';
                    utterance.rate = 0.9; 
                    utterance.pitch = pitch; 
                    utterance.onend = resolve;
                    utterance.onerror = (e) => { console.error("Błąd syntezy mowy:", e); resolve(); };
                    speechSynth.speak(utterance);
                }, delay);
            });
        }

        function playErrorSound() {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth'; 
            oscillator.frequency.setValueAtTime(120, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.6);
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.6);
        }

        async function loadNextWord() {
            document.getElementById('thumbs-up').style.display = 'none';
            filledTrucks = 0;
            
            let nextIndex;
            do {
                nextIndex = Math.floor(Math.random() * wordsData.length);
            } while (nextIndex === currentWordIndex && wordsData.length > 1);
            currentWordIndex = nextIndex;

            const currentData = wordsData[currentWordIndex];

            document.getElementById('image-display').src = "https://via.placeholder.com/250x250.png?text=Szukam...";
            let finalImageUrl = currentData.image; 
            
            if (!finalImageUrl) {
                finalImageUrl = await fetchImageUrl(currentData.word);
            }
            
            document.getElementById('image-display').src = finalImageUrl;
            document.getElementById('word-display').innerText = currentData.word;

            const sylContainer = document.getElementById('syllables-container');
            const trucksContainer = document.getElementById('trucks-container');
            sylContainer.innerHTML = '';
            trucksContainer.innerHTML = '';

            let shuffledSyllables = [...currentData.syllables].sort(() => Math.random() - 0.5);

            shuffledSyllables.forEach((syl, index) => {
                let el = document.createElement('div');
                el.classList.add('syllable');
                el.innerText = syl;
                el.setAttribute('draggable', true);
                el.id = 'syl_' + index + '_' + Date.now(); 
                el.addEventListener('dragstart', dragStart);
                sylContainer.appendChild(el);
            });

            currentData.syllables.forEach((syl, index) => {
                let wrapper = document.createElement('div');
                wrapper.classList.add('truck-wrapper');
                
                let bed = document.createElement('div');
                bed.classList.add('truck-bed');
                bed.dataset.expected = syl; 
                bed.addEventListener('dragover', dragOver);
                bed.addEventListener('drop', drop);

                let img = document.createElement('div');
                img.classList.add('truck-img');
                img.innerText = '🚛'; 

                wrapper.appendChild(bed);
                wrapper.appendChild(img);
                trucksContainer.appendChild(wrapper);
            });

            await speak("Mamy nowe zamówienie", 100);
            await speak(`Zamówienie to ${currentData.word}`, 250);
            speak("Rozpocznij załadunek odpowiednich sylab", 250); 
        }

        function dragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.id);
            setTimeout(() => e.target.style.opacity = "0.5", 0); 
        }

        function dragOver(e) {
            e.preventDefault(); 
        }

        function drop(e) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain');
            const draggedElement = document.getElementById(id);
            if (draggedElement) draggedElement.style.opacity = "1"; 
            
            const dropZone = e.currentTarget; 

            if (!draggedElement) return;

            if (draggedElement.innerText === dropZone.dataset.expected) {
                draggedElement.style.padding = "10px 20px";
                draggedElement.style.fontSize = "2rem";
                draggedElement.style.backgroundColor = "#81c784"; 
                draggedElement.setAttribute('draggable', false); 
                dropZone.appendChild(draggedElement); 
                dropZone.classList.add('filled');
                
                dropZone.removeEventListener('dragover', dragOver);
                dropZone.removeEventListener('drop', drop);
                
                filledTrucks++;
                if (filledTrucks === wordsData[currentWordIndex].count) {
                    winSequence();
                }
            } else {
                document.getElementById('syllables-container').appendChild(draggedElement);
                playErrorSound();
                speak("To nie jest dobry pomysł", 50, 0.8); 
            }
        }

        function winSequence() {
            const trucks = document.querySelectorAll('.truck-wrapper');
            trucks.forEach(t => t.classList.add('drive-away'));
            
            setTimeout(() => {
                document.getElementById('thumbs-up').style.display = 'block';
                speak("Dobra robota", 0, 1.2).then(() => {
                    
                    wordsCompletedCount++;
                    document.getElementById('score-value').innerText = wordsCompletedCount;
                    
                    setTimeout(() => {
                        document.getElementById('thumbs-up').style.display = 'none';
                        
                        if (wordsCompletedCount % 10 === 0 && wordsCompletedCount > 0) {
                            showMilestoneScreen();
                        } else {
                            loadNextWord();
                        }
                    }, 2000); 
                    
                });
            }, 1200); 
        }

        function showMilestoneScreen() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('score-counter').style.display = 'none';
            document.getElementById('milestone-screen').style.display = 'flex';
            
            document.getElementById('yes-button').style.display = 'none';
            document.getElementById('milestone-text').innerText = `Zrealizowałeś ${wordsCompletedCount} zamówień!`;
            
            const message = `Zrealizowałeś ${wordsCompletedCount} zamówień, gratulacje, czy chcesz pomóc mi z następnymi`;
            speak(message, 500, 1.1).then(() => {
                document.getElementById('yes-button').style.display = 'inline-block';
            });
        }

        function continueGame() {
            document.getElementById('milestone-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('score-counter').style.display = 'block';
            loadNextWord();
        }
    </script>
</body>
</html>
